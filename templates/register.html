<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        .register-container h1 {
            color: #333;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .register-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .register-container input:focus {
            border-color: #6B8EFF;
            outline: none;
        }
        .register-container button {
            width: 100%;
            padding: 12px;
            background-color: #6B8EFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .register-container button:hover {
            background-color: #4A7DFF;
        }
        .register-container a {
            display: block;
            margin-top: 16px;
            color: #6B8EFF;
            text-decoration: none;
            font-size: 14px;
        }
        .register-container a:hover {
            text-decoration: underline;
        }
        .logo {
            margin-bottom: 24px;
            font-size: 32px;
            color: #333;
            font-weight: bold;
        }
        .error-message {
            color: red;
            margin-bottom: 16px;
            font-size: 14px;
            background-color: #ffe6e6;
            padding: 10px;
            border-radius: 4px;
        }
        .tips {
            text-align: left;
            font-size: 12px;
            color: #666;
            margin-bottom: 16px;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
        }
        .tips ul {
            margin: 5px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">清华附中冬令营实训系统</div>
        <h1>新用户注册</h1>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
        
        <div class="tips">
            <strong>注册要求：</strong>
            <ul>
                <li>用户名至少3个字符</li>
                <li>密码至少6个字符</li>
                <li>两次密码必须一致</li>
            </ul>
        </div>
        
        <form id="register-form" method="POST" action="/register">
            <input type="text" id="username" name="username" placeholder="请输入用户名（至少3个字符）" required>
            <input type="password" id="password" name="password" placeholder="请输入密码（至少6个字符）" required>
            <input type="password" id="password_confirm" name="password_confirm" placeholder="请再次输入密码" required>
            <button type="submit">注册</button>
        </form>
        
        <a href="/">已有账号？返回登录</a>
    </div>
</body>
</html>
