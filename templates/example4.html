{% extends "base.html" %}
{% block title %}防御设置挑战 - 冬令营实训系统{% endblock %}

{% block content %}
    <h1>防御设置挑战（MyDefense）</h1>

    <style>
        .chatbot-container {
            max-width: 600px;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 600px;
            background-color: #f9f9f9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background-color: #28a745;
            color: white;
        }

        .message.bot .message-content {
            background-color: #e9ecef;
            color: #333;
        }

        .input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        #sendBtn {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #sendBtn:hover {
            background-color: #218838;
        }

        .button-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #clearBtn {
            background-color: #6c757d;
        }

        #clearBtn:hover {
            background-color: #5a6268;
        }

        #updateDefenseBtn {
            background-color: #ffc107;
            color: #333;
        }

        #updateDefenseBtn:hover {
            background-color: #e0a800;
        }

        #testUsabilityBtn {
            background-color: #17a2b8;
        }

        #testUsabilityBtn:hover {
            background-color: #138496;
        }

        .loading {
            display: none;
            color: #666;
            font-size: 12px;
            padding: 0 10px;
        }

        .info-text {
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
            background-color: #e7f3ff;
            border-left: 4px solid #2196F3;
            font-size: 14px;
        }

        .progress-container {
            display: none;
            max-width: 600px;
            margin: 15px auto;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .progress-bar-wrapper {
            background-color: #e9ecef;
            border-radius: 4px;
            height: 24px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: #17a2b8;
            border-radius: 4px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .progress-info {
            font-size: 13px;
            color: #666;
        }

        .progress-info span {
            margin-right: 15px;
        }
    </style>

    <div class="info-text">
        防御挑战模式（MyDefense）：这个模式具有防御机制，可以保护系统免受越狱攻击。点击"更新防御"按钮可以重新加载最新的防御代码。
    </div>

    <div class="chatbot-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">你好！这是防御挑战模式（有防御）。我具备安全防护机制，可以拒绝危险的请求。</div>
            </div>
        </div>
        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="输入你的消息..."
                onkeypress="handleKeyPress(event)"
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="button-area">
        <button class="control-btn" id="clearBtn" onclick="clearHistory()">清除历史</button>
        <button class="control-btn" id="updateDefenseBtn" onclick="updateDefense()">更新防御</button>
        <button class="control-btn" id="testUsabilityBtn" onclick="testUsability()">可用性检测</button>
        <span class="loading" id="loading">加载中...</span>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar-wrapper">
            <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
        </div>
        <div class="progress-info">
            <span id="progressText">准备中...</span>
            <span id="progressScore"></span>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (message === '') return;

            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            input.disabled = true;

            // 显示加载状态
            document.getElementById('loading').style.display = 'inline';

            // 调用后端 API
            fetch('/api/chatbot/defense', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({message: message})
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                input.disabled = false;
                input.focus();

                if (data.status === 'success') {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('错误: ' + data.message, 'bot');
                }
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                input.disabled = false;
                addMessage('错误: 网络连接失败', 'bot');
                console.error('Error:', error);
            });
        }

        function addMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            // 自动滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function clearHistory() {
            if (confirm('确定要清除所有对话历史吗？')) {
                fetch('/api/chatbot/clear-defense', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('chatMessages').innerHTML = '<div class="message bot"><div class="message-content">历史记录已清除，开始新对话吧！</div></div>';
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            }
        }

        function updateDefense() {
            if (confirm('确定要更新防御设置吗？这将重新加载最新的防御代码并进行可用性测试。')) {
                document.getElementById('updateDefenseBtn').disabled = true;
                addMessage('正在更新防御代码并测试可用性...', 'bot');

                fetch('/api/chatbot/update-defense', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('updateDefenseBtn').disabled = false;
                    if (data.status === 'success') {
                        let msg = '防御代码已更新并验证通过！';
                        if (data.test_response) {
                            msg += '\n测试响应: ' + data.test_response;
                        }
                        addMessage(msg, 'bot');
                    } else {
                        let errorMsg = '防御更新失败: ' + data.message;
                        if (data.detail) {
                            errorMsg += '\n详细信息: ' + data.detail;
                        }
                        addMessage(errorMsg, 'bot');
                    }
                })
                .catch(error => {
                    document.getElementById('updateDefenseBtn').disabled = false;
                    addMessage('防御更新失败: 网络错误', 'bot');
                    console.error('Error:', error);
                });
            }
        }

        function testUsability() {
            if (confirm('确定要进行可用性检测吗？这可能需要一些时间。')) {
                document.getElementById('testUsabilityBtn').disabled = true;
                document.getElementById('progressContainer').style.display = 'block';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressBar').textContent = '0%';
                document.getElementById('progressText').textContent = '准备中...';
                document.getElementById('progressScore').textContent = '';
                addMessage('正在进行可用性检测...', 'bot');

                const eventSource = new EventSource('/api/chatbot/test-usability-stream');

                eventSource.onmessage = function(event) {
                    const data = JSON.parse(event.data);

                    if (data.type === 'start') {
                        document.getElementById('progressText').textContent = `总共 ${data.total} 个测试`;
                    } else if (data.type === 'progress') {
                        document.getElementById('progressBar').style.width = data.percent + '%';
                        document.getElementById('progressBar').textContent = data.percent + '%';
                        document.getElementById('progressText').textContent =
                            `进度: ${data.current}/${data.total}`;
                        document.getElementById('progressScore').textContent =
                            `当前分数: ${data.last_score}`;
                    } else if (data.type === 'complete') {
                        eventSource.close();
                        document.getElementById('testUsabilityBtn').disabled = false;
                        document.getElementById('progressBar').style.width = '100%';
                        document.getElementById('progressBar').textContent = '100%';
                        document.getElementById('progressText').textContent = '检测完成！';

                        const summary = `可用性检测完成！\n` +
                            `总测试数: ${data.total_tests}\n` +
                            `通过数: ${data.passed_tests}\n` +
                            `失败数: ${data.failed_tests}\n` +
                            `平均质量分数: ${data.average_quality_score}`;
                        addMessage(summary, 'bot');

                        setTimeout(() => {
                            document.getElementById('progressContainer').style.display = 'none';
                        }, 3000);
                    } else if (data.type === 'error') {
                        eventSource.close();
                        document.getElementById('testUsabilityBtn').disabled = false;
                        document.getElementById('progressContainer').style.display = 'none';
                        addMessage('可用性检测失败: ' + data.message, 'bot');
                    }
                };

                eventSource.onerror = function(error) {
                    eventSource.close();
                    document.getElementById('testUsabilityBtn').disabled = false;
                    document.getElementById('progressContainer').style.display = 'none';
                    addMessage('可用性检测失败: 连接错误', 'bot');
                    console.error('SSE Error:', error);
                };
            }
        }
    </script>
{% endblock %}
