<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}清华附中-奇安信智能安全科技冬令营实训系统{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f8fafc;
            color: #334155;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 导航栏样式 - 现代化设计 */
        .navbar {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(30, 58, 138, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }
        
        .navbar h1:before {
            content: '❄️';
            margin-right: 12px;
            font-size: 1.5rem;
        }
        
        .navbar > div {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }
        
        .navbar a:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .navbar a:active {
            transform: translateY(0);
        }
        
        .navbar a i {
            font-size: 1.1rem;
        }
        
        /* 所有导航链接底色 */
        .navbar a.home {
            background-color: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .navbar a.home:hover {
            background-color: rgba(59, 130, 246, 0.25);
        }
        
        .navbar a.blog {
            background-color: rgba(249, 115, 22, 0.15);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        
        .navbar a.blog:hover {
            background-color: rgba(249, 115, 22, 0.25);
        }
        
        .navbar a.password {
            background-color: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .navbar a.password:hover {
            background-color: rgba(34, 197, 94, 0.25);
        }
        
        .navbar a.ai {
            background-color: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        
        .navbar a.ai:hover {
            background-color: rgba(168, 85, 247, 0.25);
        }

        .navbar a.profile {
            background-color: rgba(236, 72, 153, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.3);
        }
        
        .navbar a.profile:hover {
            background-color: rgba(236, 72, 153, 0.25);
        }
        
        .navbar a.logout {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        
        .navbar a.logout:hover {
            background-color: rgba(239, 68, 68, 0.3);
        }
        
        /* 内容区域样式 */
        .content {
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1.2rem;
            }
            
            .navbar > div {
                justify-content: center;
                gap: 1rem;
            }
        }
        
        @media (max-width: 768px) {
            .navbar h1 {
                font-size: 1.5rem;
            }
            
            .navbar a {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }
            
            .content {
                padding: 0 1rem;
                margin: 1.5rem auto;
            }
        }
        
        @media (max-width: 576px) {
            .navbar > div {
                gap: 0.5rem;
            }
            
            .navbar a span:not(.icon-text) {
                display: none;
            }
            
            .navbar a i {
                font-size: 1.2rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <h1>清华附中-奇安信智能安全科技冬令营实训系统</h1>
        <div>
            <a href="{{ url_for('index') }}" class="home">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </a>
            <a href="{{ url_for('blog') }}" class="blog">
                <i class="fas fa-blog"></i>
                <span>博客</span>
            </a>
            <a href="{{ url_for('PasswordSecurity') }}" class="password">
                <i class="fas fa-key"></i>
                <span>密码安全</span>
            </a>
            <a href="{{ url_for('AISecurity') }}" class="ai">
                <i class="fas fa-robot"></i>
                <span>AI安全</span>
            </a>
            <a href="{{ url_for('profile') }}" class="profile">
                <i class="fas fa-user-circle"></i>
                <span>个人中心</span>
            </a>
            <a href="{{ url_for('logout') }}" class="logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出</span>
            </a>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>

</html>
