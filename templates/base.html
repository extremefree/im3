<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}冬令营实训系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 - 所有页面共用 -->
    <div class="navbar">
        <h1>冬令营实训系统</h1>
        <div>
            <a href="{{ url_for('index') }}">首页</a>
            <a href="{{ url_for('example1') }}">案例1</a>
            <a href="{{ url_for('example2') }}">案例2</a>
            <a href="{{ url_for('example3') }}">案例3</a>
            <a href="{{ url_for('example4') }}">案例4</a>
            <a href="{{ url_for('profile') }}">个人中心</a>
            <a href="{{ url_for('logout') }}">退出</a>
        </div>
    </div>

    <!-- 主要内容区域 - 各个页面不同的内容放在这里 -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
