<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        .login-container h1 {
            color: #333;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .login-container input:focus {
            border-color: #6B8EFF; /* 上游节点浅蓝色 */
            outline: none;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #6B8EFF; /* 上游节点浅蓝色 */
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .login-container button:hover {
            background-color: #4A7DFF; /* 深蓝色 */
        }
        .login-container a {
            display: block;
            margin-top: 16px;
            color: #6B8EFF; /* 上游节点浅蓝色 */
            text-decoration: none;
            font-size: 14px;
        }
        .login-container a:hover {
            text-decoration: underline;
        }
        .logo {
            margin-bottom: 24px;
            font-size: 32px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">清华附中冬令营实训系统</div>
        <h1>欢迎登录</h1>
        
        {% if error %}
        <div style="color: red; margin-bottom: 16px; font-size: 14px; background-color: #ffe6e6; padding: 10px; border-radius: 4px;">
            {{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div style="color: green; margin-bottom: 16px; font-size: 14px; background-color: #e6ffe6; padding: 10px; border-radius: 4px;">
            {{ success }}
        </div>
        {% endif %}
        
        <form id="login-form" method="POST" action="/login">
            <input type="text" id="username" name="username" placeholder="用户名" required>
            <input type="password" id="password" name="password" placeholder="密码" required>
            <button type="submit">登录</button>
        </form>
        <a href="/register">还没有账号？立即注册</a>
        <a href="#">忘记密码？</a>
    </div>
</body>
</html>
